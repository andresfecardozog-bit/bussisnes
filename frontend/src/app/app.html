<mat-toolbar class="nutri-toolbar">
  <a routerLink="/" class="nutri-brand" aria-label="NutriAvicola - Ir al dashboard">
    <span class="nutri-brand__logo-wrap">
      <img src="/assets/logo.jpg" alt="NutriAvicola" class="nutri-brand__logo-img" />
    </span>
    <span class="nutri-brand__title">
      <span class="nutri-brand__title-main">NutriAvicola BI</span>
      <span class="nutri-brand__title-sub">Cumplimiento PRE CORTE vs FLASH</span>
    </span>
  </a>

  <span class="nutri-toolbar-spacer"></span>

  <nav class="nutri-nav" aria-label="Navegacion principal">
    <a mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <mat-icon>dashboard</mat-icon>
      Dashboard
    </a>
    <span class="nutri-nav-separator" aria-hidden="true"></span>
    <a mat-button routerLink="/batches/nuevo" routerLinkActive="active">
      <mat-icon>add</mat-icon>
      Nuevo batch
    </a>
  </nav>
</mat-toolbar>

<main class="nutri-main">
  <router-outlet />
</main>
